name: Build, Scan, Deploy java-api

on:
  pull_request:
    branches: [ "prod" ]
    paths:
      - 'javaapi/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v5.0.0
        name: Checkout
        with:
          fetch-tags: true
          lfs: true
          fetch-depth: 1  # Shallow clones should be disabled for a better relevancy of analysis
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
  build:
    runs-on: ubuntu-latest
    environment: dev
    needs: [prepare]
    steps:
    - name: Checkout
      uses: actions/checkout@v5.0.0
      with: 
          fetch-tags: true
          lfs: true
          
    - name: Setup Java
      uses: actions/setup-node@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
      
    - name: Build project (skip tests since they ran in test job)
      run: mvn clean install -DskipTests

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4.6.2
      with:
        name: java-build-artifacts
        path: |
          target/*.jar
          target/*.war
          
  docker:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    environment: prod
    needs: [build]
    env:
      IMAGE_NAME: ${{ github.repository }}
      REGISTRY: ghcr.io
      IMAGE_TAG: ${{ github.sha }}
    steps:
    - name: Checkout
      uses: actions/checkout@v5.0.0
      with: 
          fetch-tags: true
          lfs: true
          fetch-depth: 0 

    - uses: actions/download-artifact@v4
      name: Download build artifacts
      with:
        name: java-build-artifacts
        path: target/ls

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3.11.1

    - name: Docker Build
      run: docker build -t ${{ env.REGISTRY }}/${{ github.repository }}:${{ env.IMAGE_TAG }} .

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ github.repository }}:${{ env.IMAGE_TAG }}
        severity: 'CRITICAL,HIGH'
        output: 'trivy-results.sarif'
        format: 'sarif'

    - name: Tag final production images
      run: |
        docker tag ${{ env.REGISTRY }}/${{ github.repository }}:${{ env.IMAGE_TAG }} \
               ${{ env.REGISTRY }}/${{ github.repository }}:${{ env.IMAGE_TAG }}

        docker tag ${{ env.REGISTRY }}/${{ github.repository }}:${{ env.IMAGE_TAG }} \
               ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.sha }}

        docker tag ${{ env.REGISTRY }}/${{ github.repository }}:${{ env.IMAGE_TAG }} \
               ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.run_number }}
    
    - name: Docker Push
      run: |
        docker push ${{ env.REGISTRY }}/${{ github.repository }}:latest
        docker push ${{ env.REGISTRY }}/${{ github.repository }}:${{ env.IMAGE_TAG }}
        docker push ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.run_number }}
